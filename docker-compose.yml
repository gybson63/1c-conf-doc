# Backend для MCP: индекс + HTTP API.
# MCP-клиент (conf-doc mcp) запускается на хосте — см. mcp.json.docker.example.
services:
  conf-doc:
    build:
      context: .
      args:
        EXTRAS: embeddings,openai
    ports:
      - "${CONF_DOC_PORT:-8050}:8000"
    volumes:
      - ${CONF_DOC_EXPORT:-./data/export}:/data/export:ro
      - ./output:/data/output
      - ./config.yaml:/config/config.yaml
      - model-cache:/root/.cache/huggingface
    environment:
      CONF_DOC_CONFIG_PATH: /config/config.yaml
    restart: unless-stopped

volumes:
  model-cache:
