repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies:
          - lxml>=5.0
          - pydantic>=2.0
          - pydantic-settings>=2.0
          - typer>=0.12
          - fastapi>=0.115
          - faiss-cpu>=1.9
          - numpy>=1.26
          - html2text>=2024.2
          - pyyaml>=6.0
          - httpx>=0.27
          - tqdm>=4.66
          - uvicorn>=0.32
          - types-PyYAML
          - types-tqdm
        pass_filenames: false
        args: [-p, onec_conf_doc, --config-file=pyproject.toml]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
