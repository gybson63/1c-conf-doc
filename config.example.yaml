source: ./data/export
output: ./output

# Имя конфигурации из Configuration.xml (Properties/Name).
# При index определяется автоматически; нужно для search при нескольких конфигурациях в одной БД.
configuration: null

embeddings:
  provider: openai  # openai | ollama | sentence_transformers
  # OpenAI-compatible API (Polza.ai, OpenAI, и др.)
  base_url: https://polza.ai/api/v1
  model: openai/text-embedding-3-small
  openai_api_key: your-api-key-here
  batch_size: 32
  # ollama_base_url: http://localhost:11434
  # sentence-transformers (локально, без API):
  # provider: sentence_transformers
  # model: paraphrase-multilingual-MiniLM-L12-v2

faiss:
  index_type: flat  # flat | hnsw
  hnsw_m: 32

chunking:
  max_tokens: 1500
  overlap_tokens: 100

llm:
  provider: ollama  # openai | ollama | none
  model: llama3.2
  # openai_api_key: ${OPENAI_API_KEY}
  # ollama_base_url: http://localhost:11434

api:
  host: 0.0.0.0
  port: 8000
