# Пример конфигурации для Docker (скопируйте в config.yaml).
# Пути внутри контейнера — см. volumes в docker-compose.yml.

source: /data/export
output: /data/output

configuration: null

# Эмбеддинги для /search (не путать с llm — chat-модель для /query ниже).
# Дефолт: локально, без API-ключа. См. README — «Выбор провайдера эмбеддингов».
embeddings:
  provider: sentence_transformers
  model: paraphrase-multilingual-MiniLM-L12-v2
  # API-эмбеддинги (нужен образ: build --build-arg EXTRAS="embeddings,openai"):
  # provider: openai
  # base_url: https://polza.ai/api/v1
  # model: text-embedding-3-small
  # openai_api_key: your-key-here

faiss:
  index_type: flat

chunking:
  max_tokens: 1500
  overlap_tokens: 100

llm:
  provider: none

api:
  host: 0.0.0.0
  port: 8000
